<body class="season-winter">
    <div class="app-shell">
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <img src="icon.svg" alt="Логотип Акаши" class="logo-icon">
                    <div>
                        <h1 class="app-title">Акаша</h1>
                        <div class="status-bar">
                            <div id="connection-status" class="status-chip is-offline">
                                <i class="fa-solid fa-circle-xmark" aria-hidden="true"></i>
                                <span class="status-text">Нет подключения</span>
                            </div>
                            <div id="season-indicator" class="season-indicator">
                                <i class="fa-solid fa-snowflake" aria-hidden="true"></i>
                                <span>Зима</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="logout-button" class="logout-btn" hidden>
                        <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                        <span>Выйти</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div id="chat-container" class="chat-container" tabindex="-1"></div>
            
            <div id="master-chat-wrapper" class="master-chat-wrapper" hidden>
                <div class="master-chat-header">
                    <button class="chat-back-btn" onclick="window.closeMasterChat()">
                        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                    </button>
                    <h3 id="master-chat-title">Чат с Мастером</h3>
                    <div class="chat-spacer"></div>
                </div>
                <div id="master-chat-container" class="master-chat-container"></div>
                <div class="master-chat-input-wrapper">
                    <textarea 
                        id="master-chat-input" 
                        class="master-chat-input" 
                        placeholder="Введите сообщение..." 
                        maxlength="2000"
                        onkeydown="if(event.key==='Enter'&& !event.shiftKey){event.preventDefault();window.sendMasterChatMessage();}"
                    ></textarea>
                    <button id="master-chat-send" class="master-chat-send-btn" onclick="window.sendMasterChatMessage()">
                        <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </main>

        <div id="main-input-wrapper" class="main-input-wrapper">
            <div class="input-container">
                <textarea 
                    id="custom-textarea" 
                    class="custom-textarea" 
                    placeholder="Задай мне вопрос или введи команду..." 
                    maxlength="2000"
                    onkeydown="if(event.key==='Enter'&& !event.shiftKey){event.preventDefault();processUserInput();}"
                ></textarea>
                <button id="send-button" class="send-button" onclick="processUserInput()">
                    <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                </button>
            </div>
            <div id="custom-keyboard" class="custom-keyboard"></div>
        </div>

        <div id="loading-overlay" class="loading-overlay" hidden>
            <div class="loading-spinner">
                <i class="fa-solid fa-circle-notch fa-spin" aria-hidden="true"></i>
                <span id="loading-text">Загрузка...</span>
            </div>
        </div>

        <div id="toast-region" class="toast-region"></div>

        <div id="custom-modal" class="custom-modal" role="dialog" aria-hidden="true" inert>
            <div class="modal-backdrop" onclick="closeModal()"></div>
            <div class="modal-content" role="document">
                <div class="modal-header">
                    <h2 id="modal-title">Заголовок</h2>
                    <button class="modal-close-btn" onclick="closeModal()" aria-label="Закрыть">
                        <i class="fa-solid fa-times" aria-hidden="true"></i>
                    </button>
                </div>
                <div id="modal-body" class="modal-body"></div>
                <div class="modal-footer">
                    <button id="modal-cancel" class="hw-btn secondary" onclick="closeModal()">Отмена</button>
                    <button id="modal-submit" class="hw-btn primary">Подтвердить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Make Firebase available globally
        window.firebase = firebase;

        // Update connection status
        window.dbReady = true;
        const statusEl = document.getElementById('connection-status');
        if (statusEl) {
            statusEl.className = 'status-chip is-online';
            statusEl.querySelector('.status-text').textContent = 'Подключено';
        }
    </script>

    <!-- Load App Scripts -->
    <script src="config-2.5.js"></script>
    <script src="firebase-client.js"></script>
    <script src="app-2.5.js"></script>

        // Global functions available to the app
        window.firebase = firebase;
        window.windowDb = firebase.firestore();
    </script>
</body>
